<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoSarthi - Track Your Booking</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }
        .tracking-modal {
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            overflow: hidden;
            text-align: center;
        }
        .modal-header {
            background-color: #0d3c30;
            padding: 40px 20px;
            color: white;
        }
        .icon-container {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #22c55e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px auto;
        }
        .icon-container svg {
            width: 35px;
            height: 35px;
            fill: #22c55e;
        }
        .modal-header h2 {
            margin: 0;
            font-size: 26px;
            font-weight: 700;
        }
        .modal-body {
            padding: 30px;
        }
        .status-message {
            font-size: 16px;
            color: #4b5563;
            margin-bottom: 20px;
        }
        .divider {
            height: 1px;
            background-color: #e5e7eb;
            margin: 20px 0;
        }
        .notice-banner {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #15803d;
            background-color: #f0fdf4;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .status-timeline {
            display: flex;
            justify-content: space-between;
            position: relative;
            margin: 30px 20px;
        }
        .status-timeline::before {
            content: '';
            position: absolute;
            top: 14px;
            left: 0;
            width: 100%;
            height: 4px;
            background: #e5e7eb;
            z-index: 1;
        }
        .progress-line {
            position: absolute;
            top: 14px;
            left: 0;
            height: 4px;
            background: #10b981;
            z-index: 1;
            width: 0%;
            transition: width 0.4s ease;
        }
        .step {
            z-index: 2;
            position: relative;
            background: white;
            padding: 0 10px;
        }
        .circle {
            width: 32px;
            height: 32px;
            background: #e5e7eb;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px auto;
            font-weight: bold;
            color: #9ca3af;
            font-size: 14px;
        }
        .step-label {
            font-size: 13px;
            color: #9ca3af;
            font-weight: 600;
        }
        .step.active .circle {
            background: #0d3c30;
            color: white;
            box-shadow: 0 0 0 4px rgba(13, 60, 48, 0.2);
        }
        .step.active .step-label {
            color: #0d3c30;
        }
        .step.completed .circle {
            background: #10b981;
            color: white;
        }
        .step.completed .step-label {
            color: #10b981;
        }
        .done-btn {
            background-color: #0d3c30;
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .error-message {
            color: #dc3545;
            padding: 40px 20px;
            font-weight: bold;
            display: none;
        }
        .loading {
            padding: 40px 20px;
            color: #666;
        }
    </style>
</head>
<body>

<div class="tracking-modal">
    <div id="loading" class="loading">Loading live tracking dashboard...</div>
    <div id="error" class="error-message">❌ Invalid or Expired Tracking Link!</div>

    <div id="main-content" style="display: none;">
        <div class="modal-header">
            <div class="icon-container">
                <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
            </div>
            <h2>Live Booking Status</h2>
        </div>

        <div class="modal-body">
            <p class="status-message">Your vehicle service tracking details</p>
            
            <div style="text-align: left; background: #fafafa; padding: 20px; border-radius: 12px; margin: 20px 0; border-left: 5px solid #0d3c30;">
                <div style="margin-bottom: 12px; font-size: 16px; color: #333;"><strong style="color: #0d3c30;">Name : </strong><span id="cust-name">...</span></div>
                <div style="margin-bottom: 12px; font-size: 16px; color: #333;"><strong style="color: #0d3c30;">Booked Service : </strong><span id="service-name">...</span></div>
                <div style="margin-bottom: 12px; font-size: 16px; color: #333;"><strong style="color: #0d3c30;">Garage Name : </strong><span id="garage-name">...</span></div>
                <div style="margin-bottom: 0px; font-size: 16px; color: #333;"><strong style="color: #0d3c30;">Mechanic Name : </strong><span id="mechanic-name">...</span></div>
            </div>

            <div class="divider"></div>

            <div class="status-timeline">
                <div class="progress-line" id="progress-bar"></div>
                <div class="step" id="step-pending">
                    <div class="circle">✓</div>
                    <div class="step-label">Pending</div>
                </div>
                <div class="step" id="step-confirmed">
                    <div class="circle">✓</div>
                    <div class="step-label">Confirmed</div>
                </div>
            </div>

            <div class="notice-banner" id="status-notice">
                ℹ️ The mechanic will review and confirm your booking shortly.
            </div>

            <button class="done-btn" onclick="window.close()">
                ✓ Done
            </button>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            showError();
            return;
        }

        fetch(`http://localhost:8080/api/bookings/track/${token}`)
            .then(response => {
                if (!response.ok) throw new Error("Not found");
                return response.json();
            })
            .then(booking => {
                document.getElementById("loading").style.display = "none";
                document.getElementById("main-content").style.display = "block";

                // Direct mapping from the flat json response properties
                document.getElementById("cust-name").innerText = booking.customerName || "Guest Customer";
                document.getElementById("service-name").innerText = booking.serviceName || "Not Assigned";
                document.getElementById("garage-name").innerText = booking.garageName || "Not Assigned";
                document.getElementById("mechanic-name").innerText = booking.mechanicName || "Not Assigned";

                updateStatusUI(booking.status);
            })
            .catch(err => {
                showError();
            });

        function updateStatusUI(status) {
            const stepPending = document.getElementById("step-pending");
            const stepConfirmed = document.getElementById("step-confirmed");
            const progressBar = document.getElementById("progress-bar");
            const noticeBanner = document.getElementById("status-notice");

            if (status === "PENDING") {
                stepPending.classList.add("active");
                progressBar.style.width = "0%";
            } else if (status === "CONFIRMED" || status === "CONFIRM") {
                stepPending.classList.add("completed");
                stepConfirmed.classList.add("active");
                progressBar.style.width = "100%";
                noticeBanner.innerHTML = "🎉 Your booking is confirmed! The mechanic is preparing for your service.";
            }
        }

        function showError() {
            document.getElementById("loading").style.display = "none";
            document.getElementById("error").style.display = "block";
        }
    });
</script>
</body>
</html>
